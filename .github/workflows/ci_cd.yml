name: Pipeline CI/CD Java 21 (Resiliente)

on:
  push:
    branches: [ "developer" ]

jobs:
  # FASE 1: QUALIDADE E TESTES (Soma Unitários + E2E)
  testes-e-cobertura:
    name: "1. Testes & Cobertura"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar Amazon Corretto 21"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: "Executar Todos os Testes"
        # Usamos verify para garantir que os testes E2E (Failsafe) rodem.
        # -Djacoco.skip=true evita que o Maven trave o build, deixando o script abaixo decidir.
        run: mvn clean verify -Djacoco.skip=true

      - name: "Validar Cobertura Consolidada"
        run: |
          sudo apt-get install -y libxml2-utils
          
          # Busca todos os relatórios gerados (jacoco.xml e jacoco-it.xml)
          FILES=$(find . -name "jacoco.xml" -o -name "jacoco-it.xml")
          
          if [ -z "$FILES" ]; then
            echo "❌ ERRO: Nenhum relatório JaCoCo encontrado! Verifique o pom.xml."
            exit 1
          fi

          TOTAL_COVERED=0
          TOTAL_MISSED=0

          for f in $FILES; do
            echo "📖 Lendo relatório: $f"
            C=$(xmllint --xpath "string(//report/counter[@type='LINE']/@covered)" "$f" || echo 0)
            M=$(xmllint --xpath "string(//report/counter[@type='LINE']/@missed)" "$f" || echo 0)
            TOTAL_COVERED=$((TOTAL_COVERED + C))
            TOTAL_MISSED=$((TOTAL_MISSED + M))
          done
          
          TOTAL_LINES=$((TOTAL_COVERED + TOTAL_MISSED))
          
          if [ $TOTAL_LINES -eq 0 ]; then
            echo "❌ ERRO: Nenhuma linha de código mapeada."
            exit 1
          fi
          
          PERCENTAGE=$(( (TOTAL_COVERED * 100) / TOTAL_LINES ))
          
          echo "========================================"
          echo "📊 COBERTURA TOTAL (Unit + E2E): $PERCENTAGE%"
          echo "========================================"
          
          if [ $PERCENTAGE -lt 80 ]; then 
            echo "❌ FALHA: A cobertura de $PERCENTAGE% é inferior a 80%."
            exit 1
          else
            echo "✅ SUCESSO: Cobertura aprovada!"
          fi

  # FASE 2: DOCKER (BUILD, SCAN E PUSH)
  build-e-entrega:
    name: "2. Build, Scan e Docker Hub"
    needs: testes-e-cobertura
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Login no Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build da Imagem"
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest .

      - name: "Varredura de Segurança (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: "Push da Imagem Validada"
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest

  # FASE 3: DEPLOY NA AWS EC2 (PORTA 8080)
  deploy-ec2:
    name: "3. Deploy AWS EC2"
    needs: build-e-entrega
    runs-on: ubuntu-latest
    steps:
      - name: "Atualização via SSH"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            docker stop app-producao || true
            docker rm app-producao || true
            # Mapeamento 8080:8080 para sua regra de Security Group da AWS
            docker run -d --name app-producao -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            docker image prune -f

  # FASE 4: AUTOMAÇÃO DE PULL REQUEST
  abrir-pull-request:
    name: "4. Abrir PR para Main"
    needs: deploy-ec2
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Criar Pull Request"
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: developer
          base: main
          title: "🚀 Release: Developer -> Main"
          body: |
            ### 🤖 Relatório de Automação CI/CD
            - ✅ **Testes & JaCoCo:** Consolidados (Unit + E2E).
            - ✅ **Docker Hub:** Imagem atualizada.
            - ✅ **Segurança:** Scan Trivy aprovado.
            - ✅ **AWS EC2:** Deploy realizado na porta 8080.
          labels: |
            automated-pr