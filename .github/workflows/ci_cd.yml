name: Pipeline CI/CD Java 21 (Final - Monitoramento Integrado)

on:
  push:
    branches: [ "developer" ]

jobs:
  # FASE 1: BUILD, TESTES E DOCKER
  build-e-entrega:
    name: "1. Build, Teste e Docker"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar Java 21 (Amazon Corretto)"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: "Gerar Artefato (JAR)"
        run: mvn clean package

      - name: "Login no Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build da Imagem Docker"
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest .

      - name: "Varredura de Segurança (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL'

      - name: "Push para o Docker Hub"
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest

  # FASE 2: DEPLOY NA AWS EC2
  deploy-ec2:
    name: "2. Deploy AWS EC2"
    needs: build-e-entrega
    runs-on: ubuntu-latest
    steps:
      - name: "Atualização via SSH"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Autenticação e Pull
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest
            
            # 2. Garantir a existência da rede de monitoramento
            docker network create monitoring-network || true

            # 3. MELHORIA: Configuração do Prometheus (Uso do IP Bridge para máxima estabilidade)
            mkdir -p ~/prometheus
            cat <<EOF > ~/prometheus/prometheus.yml
            global:
              scrape_interval: 15s
            scrape_configs:
              - job_name: 'spring-boot-app'
                metrics_path: '/actuator/prometheus'
                static_configs:
                  - targets: ['172.17.0.1:8080']
            EOF

            # 4. GESTÃO DO APP JAVA (Lógica de limpeza e inicialização de dados)
            CONTAINER_PORT_8080=$(docker ps -q --filter "publish=8080")
            if [ ! -z "$CONTAINER_PORT_8080" ]; then
              docker stop $CONTAINER_PORT_8080 && docker rm $CONTAINER_PORT_8080
            fi
            docker stop product-comparison-app || true
            docker rm product-comparison-app || true
            
            docker run -d \
              --name product-comparison-app \
              --network monitoring-network \
              -p 8080:8080 \
              -e SPRING_SQL_INIT_MODE=always \
              -e SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION=true \
              -e SPRING_SQL_INIT_PLATFORM=h2 \
              ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest

            # 5. GESTÃO DO PROMETHEUS (Com volume de configuração)
            docker stop prometheus || true
            docker rm prometheus || true
            docker run -d \
              --name prometheus \
              --network monitoring-network \
              -p 9090:9090 \
              -v ~/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
              prom/prometheus

            # 6. GESTÃO DO GRAFANA (Ajustado para o seu domínio DuckDNS)
            if [ ! "$(docker ps -q -f name=grafana)" ]; then
                docker rm -f grafana || true
                docker run -d \
                  --name grafana \
                  --network monitoring-network \
                  -p 3000:3000 \
                  -e "GF_SERVER_ROOT_URL=https://miguelprogrammer-challenge.duckdns.org/grafana/" \
                  -e "GF_SERVER_SERVE_FROM_SUB_PATH=true" \
                  grafana/grafana
            fi
            
            # 7. Limpeza de imagens antigas
            docker image prune -f

  # FASE 3: AUTOMAÇÃO DE PULL REQUEST
  abrir-pull-request:
    name: "3. Abrir PR para Main"
    needs: deploy-ec2
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Criar Pull Request"
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: developer
          base: main
          title: "🚀 Release: Full Stack Monitoring & Java 21"
          body: |
            ### 🤖 Relatório de Automatização
            - ✅ **API Java:** Ativa em `https://miguelprogrammer-challenge.duckdns.org/`
            - ✅ **Prometheus:** Target configurado em `172.17.0.1:8080`
            - ✅ **Grafana:** Acessível via `/grafana/` com Root URL corrigido.
            - ✅ **Segurança:** Scan Trivy realizado sem vulnerabilidades Críticas.