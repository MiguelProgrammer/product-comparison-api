name: Pipeline CI/CD Java 21 (Final - Sem JaCoCo)

on:
  push:
    branches: [ "developer" ]

jobs:
  # FASE 1: TESTES UNITÁRIOS E DE INTEGRAÇÃO
  testes:
    name: "1. Executar Testes"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar Java 21"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: "Executar JUnit (Surefire & Failsafe)"
        # mvn verify garante que tanto os testes unitários quanto os E2E rodem.
        # Se algum teste falhar, o pipeline para aqui.
        run: mvn clean verify

  # FASE 2: DOCKER (BUILD, SCAN E PUSH)
  build-e-entrega:
    name: "2. Build, Scan e Docker Hub"
    needs: testes
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Login no Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build da Imagem"
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME}/app-java-21:latest .

      - name: "Varredura de Segurança (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: "Push da Imagem Validada"
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest

  # FASE 3: DEPLOY NA AWS EC2 (PORTA 8080)
  deploy-ec2:
    name: "3. Deploy AWS EC2"
    needs: build-e-entrega
    runs-on: ubuntu-latest
    steps:
      - name: "Atualização via SSH"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            docker stop app-producao || true
            docker rm app-producao || true
            # Deploy na porta 8080
            docker run -d --name app-producao -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            docker image prune -f

  # FASE 4: AUTOMAÇÃO DE PULL REQUEST
  abrir-pull-request:
    name: "4. Abrir PR para Main"
    needs: deploy-ec2
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Criar Pull Request"
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: developer
          base: main
          title: "🚀 Release Automática: Dev -> Main"
          body: |
            ### 🤖 Relatório de Pipeline
            - ✅ Testes Unitários e E2E concluídos.
            - ✅ Imagem Docker enviada ao Hub.
            - ✅ Segurança validada pelo Trivy.
            - ✅ Deploy realizado na EC2 (Porta 8080).
          labels: |
            automated-pr