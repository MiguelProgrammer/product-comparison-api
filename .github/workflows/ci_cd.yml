name: Pipeline CI/CD

on:
  push:
    branches: [ "developer" ]

jobs:
  # FASE 1: BUILD, TESTES E DOCKER
  build-e-entrega:
    name: "1. Build, Teste e Docker"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar Java 21 (Amazon Corretto)"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: "Gerar Artefato (JAR)"
        run: mvn clean package -DskipTests

      - name: "Login no Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build e Push da Imagem"
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest

  # FASE 2: DEPLOY NA AWS EC2
  deploy-ec2:
    name: "2. Deploy AWS EC2"
    needs: build-e-entrega
    runs-on: ubuntu-latest
    steps:
      - name: "Atualização via SSH"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Login e Pull da imagem nova
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest
            
            # 2. Garantir a existência da rede isolada
            docker network create monitoring-network || true

            # 3. Configuração do Prometheus (Comunicação INTERNA via Docker)
            mkdir -p ~/prometheus
            cat <<EOF > ~/prometheus/prometheus.yml
            global:
              scrape_interval: 15s
            scrape_configs:
              - job_name: 'spring-boot-app'
                metrics_path: '/actuator/prometheus'
                static_configs:
                  - targets: ['product-comparison-app:8080']
            EOF

            # 4. SOBE O APP JAVA (Com alias de rede)
            docker stop product-comparison-app || true
            docker rm product-comparison-app || true
            docker run -d \
              --name product-comparison-app \
              --network monitoring-network \
              --network-alias product-comparison-app \
              -p 8080:8080 \
              -e SPRING_SQL_INIT_MODE=always \
              -e SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION=true \
              -e SPRING_SQL_INIT_PLATFORM=h2 \
              ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest

            # 5. SOBE O PROMETHEUS
            docker stop prometheus || true
            docker rm prometheus || true
            docker run -d \
              --name prometheus \
              --network monitoring-network \
              --network-alias prometheus \
              -p 9090:9090 \
              -v ~/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
              prom/prometheus

            # 6. SOBE O GRAFANA (Configurado para Sub-path /grafana/)
            docker stop grafana || true
            docker rm grafana || true
            docker run -d \
              --name grafana \
              --user root \
              --network monitoring-network \
              --network-alias grafana \
              -p 3000:3000 \
              -e "GF_SERVER_DOMAIN=miguelprogrammer-challenge.duckdns.org" \
              -e "GF_SERVER_ROOT_URL=https://miguelprogrammer-challenge.duckdns.org/grafana/" \
              -e "GF_SERVER_SERVE_FROM_SUB_PATH=true" \
              grafana/grafana
            
            # 7. Cleanup
            docker image prune -f

  # FASE 3: AUTOMAÇÃO DE PULL REQUEST
  abrir-pull-request:
    name: "3. Abrir PR para Main"
    needs: deploy-ec2
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: "Checkout"
        uses: checkout@v4
      - name: "Criar Pull Request"
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: developer
          base: main
          title: "🚀 Release: Monitoramento Ativo com Sub-path"