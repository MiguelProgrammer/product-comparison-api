name: Pipeline CI/CD Java 21

on:
  push:
    branches: [ "developer" ]

jobs:
  # FASE 1: EXECUÇÃO DE TESTES
  testes:
    name: "1. Executar Testes"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar Java 21"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: "Executar JUnit e Integração"
        # O comando 'verify' garante que tanto os testes unitários (Surefire)
        # quanto os testes de integração/E2E (Failsafe) sejam executados.
        run: mvn clean verify

  # FASE 2: DOCKER (BUILD, SCAN E PUSH)
  build-e-entrega:
    name: "2. Build, Scan e Docker Hub"
    needs: testes
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Login no Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build da Imagem"
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest .

      - name: "Varredura de Segurança (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest'
          format: 'table'
          exit-code: '1' # Interrompe o pipeline se encontrar vulnerabilidades Críticas/Altas
          severity: 'CRITICAL,HIGH'

      - name: "Push da Imagem Validada"
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest

  # FASE 3: DEPLOY NA AWS EC2 (PORTA 8080)
  deploy-ec2:
    name: "3. Deploy AWS EC2"
    needs: build-e-entrega
    runs-on: ubuntu-latest
    steps:
      - name: "Atualização via SSH"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login no Docker Hub dentro da instância
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Baixa a nova imagem
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            
            # Para e remove o container antigo se ele existir
            docker stop app-producao || true
            docker rm app-producao || true
            
            # Executa o novo container mapeando a porta 8080
            docker run -d --name app-producao -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            
            # Limpa imagens antigas sem uso (economia de espaço)
            docker image prune -f

  # FASE 4: AUTOMAÇÃO DE PULL REQUEST
  abrir-pull-request:
    name: "4. Abrir PR para Main"
    needs: deploy-ec2
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Criar Pull Request"
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: developer
          base: main
          title: "🚀 Release: Developer -> Main"
          body: |
            ### 🤖 Relatório Automático de CI/CD
            - ✅ **Testes:** JUnit e E2E executados com sucesso.
            - ✅ **Docker:** Imagem buildada e enviada ao Docker Hub.
            - ✅ **Segurança:** Scan Trivy aprovado (Sem Critical/High).
            - ✅ **Deploy:** Aplicação atualizada na AWS EC2 (Porta 8080).
            
            *Este PR foi gerado automaticamente após o sucesso de todas as etapas.*
          labels: |
            automated-pr
            ready-for-merge