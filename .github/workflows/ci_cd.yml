name: Pipeline CI/CD Java 21 (Developer to Main)

on:
  push:
    branches: [ "developer" ]

jobs:
  # FASE 1: QUALIDADE E TESTES (Cálculo manual para evitar que o Maven trave)
  testes-e-cobertura:
    name: "1. Testes & Cobertura (80%)"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar Amazon Corretto 21"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: "Executar JUnit e Gerar Relatório JaCoCo"
        # O flag -Djacoco.skip=true evita que o plugin do Maven trave o build,
        # permitindo que o próximo passo leia o relatório e nos dê a porcentagem real.
        run: mvn clean verify -Djacoco.skip=true

      - name: "Validar Cobertura via Script"
        run: |
          sudo apt-get install -y libxml2-utils
          # Localiza o arquivo de relatório
          REPORT_PATH="target/site/jacoco/jacoco.xml"
          
          if [ ! -f "$REPORT_PATH" ]; then
            echo "❌ ERRO: Relatório JaCoCo não encontrado em $REPORT_PATH"
            exit 1
          fi

          # Extrai os dados de cobertura de linhas
          COVERED=$(xmllint --xpath "string(//report/counter[@type='LINE']/@covered)" $REPORT_PATH)
          MISSED=$(xmllint --xpath "string(//report/counter[@type='LINE']/@missed)" $REPORT_PATH)
          TOTAL=$((COVERED + MISSED))
          
          if [ $TOTAL -eq 0 ]; then
            echo "❌ ERRO: Total de linhas é zero. Verifique seus testes."
            exit 1
          fi
          
          PERCENTAGE=$(( (COVERED * 100) / TOTAL ))
          
          echo "========================================"
          echo "📊 COBERTURA ATUAL: $PERCENTAGE%"
          echo "========================================"
          
          if [ $PERCENTAGE -lt 80 ]; then 
            echo "❌ FALHA: A cobertura de $PERCENTAGE% é inferior ao limite de 80%."
            exit 1
          else
            echo "✅ SUCESSO: Cobertura aprovada!"
          fi

  # FASE 2: DOCKER (BUILD, SCAN E PUSH)
  build-e-entrega:
    name: "2. Build, Scan e Docker Hub"
    needs: testes-e-cobertura
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Login no Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build da Imagem"
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest .

      - name: "Varredura de Segurança (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: "Push da Imagem Validada"
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest

  # FASE 3: DEPLOY NA AWS EC2 (PORTA 8080)
  deploy-ec2:
    name: "3. Deploy AWS EC2"
    needs: build-e-entrega
    runs-on: ubuntu-latest
    steps:
      - name: "Atualização via SSH"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login no Docker Hub dentro da EC2
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Pull da nova imagem
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            
            # Remove container antigo se existir
            docker stop app-producao || true
            docker rm app-producao || true
            
            # Sobe o novo na porta 8080 (Mapeando porta da EC2 para porta do Spring)
            docker run -d --name app-producao -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            
            # Limpa imagens antigas (Dangling images)
            docker image prune -f

  # FASE 4: AUTOMAÇÃO DE PULL REQUEST
  abrir-pull-request:
    name: "4. Abrir PR para Main"
    needs: deploy-ec2
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Criar Pull Request"
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: developer
          base: main
          title: "🚀 Release: Developer -> Main"
          body: |
            ### 🤖 Relatório de Automação CI/CD
            - ✅ **Testes & JaCoCo:** Aprovados (Min 80%).
            - ✅ **Docker Hub:** Imagem buildada e enviada.
            - ✅ **Segurança:** Scan Trivy sem vulnerabilidades críticas.
            - ✅ **AWS EC2:** Deploy realizado na porta 8080.
            
            *PR gerado automaticamente após sucesso no pipeline.*
          labels: |
            automated-pr
            ready-for-merge