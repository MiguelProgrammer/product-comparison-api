name: Pipeline CI/CD Java 21

on:
  push:
    branches: [ "developer" ]

jobs:
  # UNIFICADO: Testes, Build do JAR e Push para Docker Hub
  # Fazemos tudo em um único Job para o Docker encontrar a pasta /target
  build-e-entrega:
    name: "1. Build, Teste e Docker"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar Java 21 (Amazon Corretto)"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: "Gerar Artefato (JAR)"
        # O comando 'package' roda os testes E cria o arquivo em target/*.jar
        run: mvn clean package

      - name: "Login no Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build e Tag da Imagem"
        # Agora o target/*.jar EXISTE nesta máquina virtual
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest .

      - name: "Varredura de Segurança (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: "Push para o Docker Hub"
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest

  # FASE 2: DEPLOY NA AWS EC2
  deploy-ec2:
    name: "2. Deploy AWS EC2"
    needs: build-e-entrega
    runs-on: ubuntu-latest
    steps:
      - name: "Atualização via SSH"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Autentica no Docker Hub dentro da EC2
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Puxa a imagem mais nova
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            
            # Remove container antigo se existir
            docker stop app-producao || true
            docker rm app-producao || true
            
            # Sobe o novo container na porta 8080
            docker run -d --name app-producao -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            
            # Limpa lixo de imagens antigas
            docker image prune -f

  # FASE 3: PULL REQUEST AUTOMÁTICO
  abrir-pull-request:
    name: "3. Abrir PR para Main"
    needs: deploy-ec2
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Criar Pull Request"
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: developer
          base: main
          title: "🚀 Release: Dev -> Main"
          body: |
            ### 🤖 Relatório de Deploy
            - ✅ Build do JAR realizado.
            - ✅ Testes unitários e E2E aprovados.
            - ✅ Imagem Docker enviada.
            - ✅ Deploy realizado na porta 8080.
          labels: |
            automated-pr