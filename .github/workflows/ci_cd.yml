name: Pipeline CI - Developer Validation

on:
  push:
    branches: [ "developer" ]
  pull_request:
    branches: [ "developer" ]

# Resolve o aviso de "Node.js 20 actions are deprecated"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # JOB ÚNICO: VALIDAÇÃO DE QUALIDADE
  validate-code:
    name: "Unit Tests & Quality Check"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar Java 21 (Amazon Corretto)"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: "Executar Testes Unitários e Integrados"
        # Aqui garantimos que o build só passa se 100% dos testes passarem
        run: mvn clean test

      - name: "Verificar Compilação (Checkstyle/Lint)"
        # Garante que o artefato pode ser gerado sem erros de compilação
        run: mvn package -DskipTests

      - name: "Publicar Relatório de Testes (Opcional)"
        # Isso ajuda a ver quais testes falharam diretamente na interface do GitHub
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/