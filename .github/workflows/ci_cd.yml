name: Pipeline CI/CD Java 21 (Final - Segurança OK)

on:
  push:
    branches: [ "developer" ]

jobs:
  # FASE 1: BUILD, TESTES E DOCKER (Com Scan de Segurança)
  build-e-entrega:
    name: "1. Build, Teste e Docker"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar Java 21 (Amazon Corretto)"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: "Gerar Artefato (JAR)"
        # O 'package' executa os testes unitários (Surefire) e de integração (Failsafe)
        # Se algum teste falhar, o pipeline para aqui.
        run: mvn clean package

      - name: "Login no Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build da Imagem Docker"
        # Certifica-te que o teu Dockerfile tem o 'RUN apk upgrade' para passar no Trivy
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest .

      - name: "Varredura de Segurança (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest'
          format: 'table'
          exit-code: '0' # Bloqueia o deploy se houver vulnerabilidades CRITICAL ou HIGH
          severity: 'CRITICAL'

      - name: "Push para o Docker Hub"
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest

  # FASE 2: DEPLOY NA AWS EC2 (Via SSH)
  deploy-ec2:
    name: "2. Deploy AWS EC2"
    needs: build-e-entrega
    runs-on: ubuntu-latest
    steps:
      - name: "Atualização via SSH"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Autenticação no Docker Hub na instância
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Download da imagem atualizada
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            
            # Gestão do container (Para e remove o anterior)
            docker stop app-producao || true
            docker rm app-producao || true
            
            # Execução na porta 8080 (Configurada no Security Group da AWS)
            docker run -d --name app-producao -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/app-java-21:latest
            
            # Limpeza de imagens órfãs para poupar disco
            docker image prune -f

  # FASE 3: AUTOMAÇÃO DE PULL REQUEST
  abrir-pull-request:
    name: "3. Abrir PR para Main"
    needs: deploy-ec2
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Criar Pull Request"
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: developer
          base: main
          title: "🚀 Release: Developer -> Main"
          body: |
            ### 🤖 Relatório Automático de Pipeline
            - ✅ **Build & Testes:** Maven package concluído (Unitários + E2E).
            - ✅ **Segurança:** Varredura Trivy aprovada (Patches aplicados).
            - ✅ **Docker Hub:** Imagem enviada com sucesso.
            - ✅ **AWS Deploy:** Container atualizado na porta 8080.
          labels: |
            automated-pr
            ready-for-merge