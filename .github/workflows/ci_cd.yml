name: Pipeline CI/CD

on:
  push:
    branches: [ "developer" ]

# Resolve o aviso de "Node.js 20 actions are deprecated" globalmente
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # FASE 1: BUILD, TESTES E DOCKER
  build-e-entrega:
    name: "1. Build, Teste e Docker"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      - name: "Configurar Java 21 (Amazon Corretto)"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: "Gerar Artefato (JAR)"
        run: mvn clean package -DskipTests

      - name: "Login no Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build e Push da Imagem"
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest

  # FASE 2: DEPLOY NA AWS EC2 (Com passos visíveis)
  deploy-ec2:
    name: "2. Deploy AWS EC2"
    needs: build-e-entrega
    runs-on: ubuntu-latest
    steps:
      - name: "1. Preparar Ambiente e Pull"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest
            docker network create monitoring-network || true
            docker stop product-comparison-app prometheus grafana || true
            docker rm product-comparison-app prometheus grafana || true

      - name: "2. Configurar Prometheus Config"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/prometheus
            cat <<EOF > ~/prometheus/prometheus.yml
            global:
              scrape_interval: 3s
            scrape_configs:
              - job_name: 'spring-boot-app'
                metrics_path: '/actuator/prometheus'
                static_configs:
                  - targets: ['product-comparison-app:8080']
            EOF

      - name: "3. Deploy APP JAVA (Spring Boot)"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker run -d \
              --name product-comparison-app \
              --network monitoring-network \
              -p 8080:8080 \
              -e SPRING_SQL_INIT_MODE=always \
              -e DATABASE_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DATABASE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e DATABASE_URL="jdbc:h2:mem:product;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;PASSWORD=${{ secrets.DB_PASSWORD }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/product-comparison-app:latest

      - name: "4. Deploy Prometheus"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker run -d \
              --name prometheus \
              --network monitoring-network \
              -p 9090:9090 \
              -v ~/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
              prom/prometheus \
              --config.file=/etc/prometheus/prometheus.yml \
              --web.external-url=https://miguelprogrammer-challenge.duckdns.org/prometheus/ \
              --web.route-prefix=/

      - name: "5. Deploy Grafana"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker volume create grafana-storage || true
            docker run -d \
              --name grafana \
              --user root \
              --network monitoring-network \
              -p 3000:3000 \
              -v grafana-storage:/var/lib/grafana \
              -e "GF_SERVER_DOMAIN=miguelprogrammer-challenge.duckdns.org" \
              -e "GF_SERVER_ROOT_URL=https://miguelprogrammer-challenge.duckdns.org/grafana/" \
              -e "GF_SERVER_SERVE_FROM_SUB_PATH=true" \
              -e "GF_SECURITY_ADMIN_PASSWORD=admin123" \
              -e "GF_INSTALL_PLUGINS=grafana-piechart-panel" \
              grafana/grafana:latest

      - name: "6. Cleanup"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: docker image prune -f

  # FASE 3: TESTE DE CARGA (JMeter)
  performance-test:
    name: "3. Teste de Performance (JMeter)"
    needs: deploy-ec2
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout do código"
        uses: actions/checkout@v4

      # AGUARDAR O GRAFANA/PROMETHEUS ESTAREM PRONTOS
      - name: "Aguardar inicialização dos serviços (30s)"
        run: sleep 30

      - name: "Instalar JMeter"
        run: |
          sudo apt-get update
          sudo apt-get install -y jmeter

      - name: "Executar Teste de Carga"
        run: |
          # 1. Garante que a pasta existe (caso você queira gerar o JMX no voo)
          mkdir -p tests/performance
          
          # 2. Se o arquivo JMX não existir, o JMeter vai falhar. 
          # Verifique se você fez o commit do load_test.jmx no seu repositório!
          
          jmeter -n -t ./tests/performance/load_test.jmx \
          -l results.jtl \
          -Jserver=miguelprogrammer-challenge.duckdns.org \
          -Jport=443 \
          -Jprotocol=https

          - name: "Verificar Logs do JMeter (Debug)"
            if: always() # Roda mesmo que o JMeter falhe, para ajudar no debug
            run: |
              if [ -f results.jtl ]; then
                tail -n 20 results.jtl
              else
                echo "❌ O arquivo results.jtl não foi encontrado. O JMeter provavelmente não iniciou corretamente."
              fi