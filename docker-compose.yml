version: '3.8'

services:
  # API Spring Boot
  product-comparison-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - monitoring
    depends_on:
      - prometheus

  # Prometheus para coleta de métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - monitoring

  # Grafana para visualização
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitoring
    depends_on:
      - prometheus

  # Alpine para testes e debug
  alpine-metrics:
    image: alpine:latest
    container_name: alpine-metrics
    command: >
      sh -c "
        apk add --no-cache curl jq &&
        echo '=== Container Alpine Pronto ===' &&
        echo 'Comandos para testar métricas:' &&
        echo '' &&
        echo '1. Health da API:' &&
        echo '   curl http://product-comparison-api:8080/actuator/health' &&
        echo '' &&
        echo '2. Todas as métricas:' &&
        echo '   curl http://product-comparison-api:8080/actuator/metrics' &&
        echo '' &&
        echo '3. Métricas Prometheus:' &&
        echo '   curl http://product-comparison-api:8080/actuator/prometheus' &&
        echo '' &&
        echo '4. Métrica específica:' &&
        echo '   curl http://product-comparison-api:8080/actuator/metrics/business.comparisons.successful.total' &&
        echo '' &&
        echo '5. Status Prometheus:' &&
        echo '   curl http://prometheus:9090/api/v1/query?query=up' &&
        echo '' &&
        echo 'Acesse Grafana em: http://localhost:3000 (admin/admin123)' &&
        echo 'Acesse Prometheus em: http://localhost:9090' &&
        echo '===============================' &&
        tail -f /dev/null
      "
    networks:
      - monitoring
    depends_on:
      - product-comparison-api
      - prometheus
      - grafana

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge