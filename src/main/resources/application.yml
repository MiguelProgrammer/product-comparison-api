spring:
  application:
    name: product-comparison-api

  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:product}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      pool-name: ProductComparisonHikariCP

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true} # Ativado para facilitar seu debug na EC2
      path: /h2-console
      settings:
        web-allow-others: true # Necessário para acessar o console via IP/DNS externo

  jpa:
    database-platform: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    # MELHORIA: Força o Hibernate a preparar o esquema antes do data.sql rodar
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: false
        # Garante que o H2 entenda comandos modernos de SQL
        dialect: org.hibernate.dialect.H2Dialect

  sql:
    init:
      # MELHORIA: Garante execução em qualquer banco (não só em memória)
      mode: ${SQL_INIT_MODE:always}
      platform: h2
      continue-on-error: true # Se o dado já existir, ele não trava a subida do app

  # MELHORIA: Faz o Spring entender os cabeçalhos do Nginx (HTTPS/Forwarded)
  server:
    forward-headers-strategy: native

  messages:
    encoding: UTF-8
    basename: messages

  cache:
    type: simple
    cache-names:
      - products
      - product-comparisons

  tracing:
    enabled: ${TRACING_ENABLED:true}
    zipkin:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
    sampling:
      probability: ${TRACING_SAMPLING:0.1}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  # Configuração extra para evitar erros de frame no console do H2
  servlet:
    session:
      cookie:
        http-only: true

logging:
  level:
    org.hibernate.SQL: ${LOG_SQL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_SQL_PARAMS:WARN}
    com.compareproduct.meli: ${LOG_APP:INFO}
    io.github.resilience4j: ${LOG_RESILIENCE:INFO}
    org.springframework.web: ${LOG_WEB:INFO}
    root: ${LOG_ROOT:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/product-comparison-api.log}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
    # MELHORIA: Tenta detectar o protocolo (http/https) automaticamente
    display-query-params-request: true

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:info,health,metrics,prometheus,circuitbreakers,ratelimiters}
      base-path: /actuator
      cors:
        # MELHORIA: Adicionado seu domínio nas origens permitidas
        allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080,https://miguelprogrammer-challenge.duckdns.org}
        allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: product-comparison-api
      environment: ${ENVIRONMENT:production}

# Resilience4j Configuration (Mantida conforme seu original)
resilience4j:
  circuitbreaker:
    instances:
      product-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
  ratelimiter:
    instances:
      comparison-api:
        limit-for-period: 100
        limit-refresh-period: 1m