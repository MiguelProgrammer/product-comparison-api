spring:
  application:
    name: product-comparison-api

  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:product;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE} # MELHORIA: Mantém o banco vivo enquanto o app rodar
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      pool-name: ProductComparisonHikariCP

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    defer-datasource-initialization: true # Mantido: Essencial para o data.sql rodar DEPOIS das tabelas
    properties:
      hibernate:
        format_sql: false
        highlight_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      platform: h2 # MELHORIA: Indica explicitamente a plataforma para o data.sql
      continue-on-error: true

  # MELHORIA: Movido para dentro do bloco spring para sintaxe correta
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration # Opcional: só se o H2 console pedir login e você não tiver security configurado

  messages:
    encoding: UTF-8
    basename: messages

  cache:
    type: simple
    cache-names:
      - products
      - product-comparisons

  tracing:
    enabled: ${TRACING_ENABLED:true}
    zipkin:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
    sampling:
      probability: ${TRACING_SAMPLING:0.1}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native # Mantido: Crucial para HTTPS no Nginx
  shutdown: graceful
  servlet:
    session:
      cookie:
        http-only: true

logging:
  level:
    org.hibernate.SQL: ${LOG_SQL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_SQL_PARAMS:WARN}
    com.compareproduct.meli: ${LOG_APP:INFO}
    io.github.resilience4j: ${LOG_RESILIENCE:INFO}
    org.springframework.web: ${LOG_WEB:INFO}
    root: ${LOG_ROOT:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/product-comparison-api.log}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
    display-query-params-request: true

management:
  endpoints:
    web:
      exposure:
        include: "*" # MELHORIA: Facilita o monitoramento completo (pode restringir depois)
      base-path: /actuator
      cors:
        allowed-origins: "*" # MELHORIA: Para evitar o erro de 'Failed to fetch' no dashboard do Grafana/Prometheus
        allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true # MELHORIA: Útil para o Kubernetes ou scripts de check na EC2
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:production}

resilience4j:
  circuitbreaker:
    instances:
      product-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        register-health-indicator: true # MELHORIA: Expõe o status no /actuator/health
  ratelimiter:
    instances:
      comparison-api:
        limit-for-period: 100
        limit-refresh-period: 1m
        register-health-indicator: true