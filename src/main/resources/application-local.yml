# Configuração para desenvolvimento local
spring:
  datasource:
    url: jdbc:h2:mem:product
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  
  sql:
    init:
      mode: always
  
  cache:
    type: simple
    cache-names:
      - products
      - product-comparisons
  
  # Telemetria para desenvolvimento
  tracing:
    enabled: true
    zipkin:
      endpoint: http://localhost:9411/api/v2/spans
    sampling:
      probability: 1.0

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.compareproduct.meli: DEBUG
    io.github.resilience4j: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: info,health,caches,metrics,prometheus,httptrace,circuitbreakers,ratelimiters
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: 10s
        descriptions: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        comparisons.duration: true
        products.fetch.duration: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        comparisons.duration: 0.5, 0.95, 0.99
        products.fetch.duration: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms,200ms,500ms,1s,2s
        comparisons.duration: 50ms,100ms,200ms,500ms
    tags:
      application: product-comparison-api
      environment: local
      version: 1.0.0
  info:
    app:
      name: Product Comparison API
      version: 1.0.0
      description: API para comparação de produtos - Desenvolvimento
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# Resilience4j Configuration para desenvolvimento
resilience4j:
  circuitbreaker:
    instances:
      product-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 5
        minimum-number-of-calls: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - com.compareproduct.meli.exception.ProductNotFoundException
  
  ratelimiter:
    instances:
      comparison-api:
        limit-for-period: 50
        limit-refresh-period: 1m
        timeout-duration: 2s
        register-health-indicator: true
  
  metrics:
    enabled: true
    legacy:
      enabled: false
  
  health:
    enabled: true