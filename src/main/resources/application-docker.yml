# Configuração para ambiente Docker
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:product}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 15
      minimum-idle: 3
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 60000
      pool-name: ProductComparisonHikariCP

  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  cache:
    type: simple
    cache-names:
      - products
      - product-comparisons

  # Telemetria para Docker
  tracing:
    enabled: true
    zipkin:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
    sampling:
      probability: 0.3

server:
  port: 8080
  shutdown: graceful

logging:
  level:
    org.hibernate.SQL: WARN
    com.compareproduct.meli: INFO
    io.github.resilience4j: INFO
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: info,health,metrics,prometheus,circuitbreakers,ratelimiters
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: ${PROMETHEUS_STEP:15s}
        descriptions: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        comparisons.duration: true
        products.fetch.duration: true
        resilience4j.circuitbreaker.calls: true
        resilience4j.ratelimiter.calls: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        comparisons.duration: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms,200ms,500ms,1s,2s
        comparisons.duration: 50ms,100ms,200ms,500ms
    tags:
      application: product-comparison-api
      environment: docker
      version: 1.0.0
  info:
    app:
      name: Product Comparison API
      version: 1.0.0
      description: API para comparação de produtos - Docker
    env:
      enabled: true
    java:
      enabled: true

# Resilience4j para Docker
resilience4j:
  circuitbreaker:
    instances:
      product-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - com.compareproduct.meli.exception.ProductNotFoundException
          - java.util.concurrent.TimeoutException

  ratelimiter:
    instances:
      comparison-api:
        limit-for-period: 100
        limit-refresh-period: 1m
        timeout-duration: 5s
        register-health-indicator: true

  metrics:
    enabled: true
    legacy:
      enabled: false

  health:
    enabled: true